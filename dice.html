<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            text-align: center;
            margin-top: 300px;
            font-family: 'Times New Roman', Times, serif;
            background-color: aqua;

        }

        button{
            padding: 10px 20px;
            font-size: 20px;
        }
        #dice{
            font-size: 60px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h2>Dice rool game</h2>
    <div id="dice">🎲</div>
<button onclick="diceroll()">diceroll</button>
<script>
    function diceroll(){
        let num=Math.floor(Math.random()*6)+1;
        document.getElementById("dice").innerText=num;
    }
</script>
</body>
</html>
